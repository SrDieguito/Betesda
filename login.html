<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Betesda</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
    font-family: system-ui;
}

/* Animaciones */
.fade-in{
    animation: fadeIn .6s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(10px)}
    to{opacity:1; transform:translateY(0)}
}

/* Glow dorado */
.glow:focus{
    box-shadow: 0 0 0 2px #BF9B30;
}
</style>

</head>

<body class="bg-zinc-950 text-white flex items-center justify-center min-h-screen">

<!-- CONTENEDOR -->
<div class="w-full max-w-md px-6">

    <!-- LOGO -->
    <div class="text-center mb-8 fade-in">
        <img src="img/1.png" class="w-20 h-20 mx-auto rounded-full border-2 border-[#BF9B30] mb-4">
        
        <h1 class="text-2xl font-bold">
            Iglesia Bautista
        </h1>
        <h2 class="text-[#BF9B30] text-xl font-bold">
            Betesda
        </h2>
    </div>

    <!-- CARD LOGIN -->
    <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-8 shadow-xl fade-in">

        <h3 class="text-xl font-semibold mb-6 text-center">
            Iniciar sesión
        </h3>

        <!-- FORM -->
        <form id="loginForm" class="space-y-4">

            <!-- EMAIL -->
            <div>
                <label class="text-sm text-zinc-400">Correo</label>
                <div class="relative mt-1">
                    <i class="fa-solid fa-envelope absolute left-3 top-3 text-zinc-500"></i>
                    <input 
                        type="email" 
                        id="email"
                        required
                        placeholder="correo@gmail.com"
                        class="w-full pl-10 pr-3 py-2 bg-zinc-800 border border-zinc-700 rounded-lg 
                               focus:outline-none glow transition">
                </div>
            </div>

            <!-- PASSWORD -->
            <div>
                <label class="text-sm text-zinc-400">Contraseña</label>
                <div class="relative mt-1">
                    <i class="fa-solid fa-lock absolute left-3 top-3 text-zinc-500"></i>
                    <input 
                        type="password" 
                        id="password"
                        required
                        placeholder="********"
                        class="w-full pl-10 pr-10 py-2 bg-zinc-800 border border-zinc-700 rounded-lg 
                               focus:outline-none glow transition">
                    
                    <!-- Toggle password -->
                    <i onclick="togglePassword()" 
                       class="fa-solid fa-eye absolute right-3 top-3 cursor-pointer text-zinc-500 hover:text-white">
                    </i>
                </div>
            </div>

            <!-- BOTÓN -->
            <button 
                type="submit"
                class="w-full bg-[#BF9B30] text-black py-2 rounded-lg font-semibold 
                       hover:opacity-80 transition-all duration-300">
                Ingresar
            </button>

        </form>

        <!-- ERROR -->
        <p id="error" class="text-red-400 text-sm mt-4 hidden text-center">
            Credenciales incorrectas
        </p>

    </div>

    <!-- VOLVER -->
    <div class="text-center mt-6 fade-in">
        <a href="index.html" class="text-zinc-400 hover:text-[#BF9B30] text-sm">
            ← Volver al inicio
        </a>
    </div>

</div>

<script>

// 🔐 PROTECCIÓN DE LOGIN (PONER ARRIBA DE TODO)
const user = localStorage.getItem("user")

if (!user) {
    window.location.href = "login.html"
}

// ----------------------------
// TU CÓDIGO EXISTENTE ABAJO
// ----------------------------

let personas = JSON.parse(localStorage.getItem("personas")) || []

// Mostrar/ocultar contraseña
function togglePassword(){
    const input = document.getElementById("password")
    input.type = input.type === "password" ? "text" : "password"
}

// LOGIN (temporal)
document.getElementById("loginForm").addEventListener("submit", function(e){
    e.preventDefault()

    const email = document.getElementById("email").value
    const password = document.getElementById("password").value

    // Simulación (luego lo conectamos a Supabase)
    if(email === "admin@test.com" && password === "123456"){
        window.location.href = "dashboard.html"
    } else {
        document.getElementById("error").classList.remove("hidden")
    }
})

document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault()

    const email = document.getElementById("email").value
    const password = document.getElementById("password").value

    const res = await fetch("/api/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ email, password })
    })

    const data = await res.json()

    if (!res.ok) {
        document.getElementById("error").textContent = data.error
        document.getElementById("error").classList.remove("hidden")
        return
    }

    // guardar sesión
    localStorage.setItem("user", JSON.stringify(data.user))

    // redirigir
    window.location.href = "dashboard.html"
})
</script>

</body>
</html>
